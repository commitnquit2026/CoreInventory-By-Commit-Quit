<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueCyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d7a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e63b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Center Hexagon -->
  <g id="center-hex" transform="translate(500, 500)">
    <!-- Outer hexagon -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" 
             fill="url(#blueCyanGrad)" stroke="url(#cyanGlow)" stroke-width="3"/>
    <!-- Inner glow circle -->
    <circle cx="0" cy="0" r="70" fill="url(#cyanGlow)" opacity="0.6"/>
    <circle cx="0" cy="0" r="50" fill="#00f0ff" opacity="0.8"/>
  </g>
  
  <!-- Surrounding Cubes (8 total) -->
  <!-- Top -->
  <g transform="translate(500, 200)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Bottom -->
  <g transform="translate(500, 800)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Left -->
  <g transform="translate(200, 500)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Right -->
  <g transform="translate(800, 500)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Top-Left (45 degrees) -->
  <g transform="translate(317, 317)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Top-Right (45 degrees) -->
  <g transform="translate(683, 317)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Bottom-Left (45 degrees) -->
  <g transform="translate(317, 683)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Bottom-Right (45 degrees) -->
  <g transform="translate(683, 683)">
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1e63b0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.9"/>
    <polygon points="-43.3,-25 0,-50 0,0 -43.3,25" fill="#003d7a" opacity="0.7"/>
    <polygon points="43.3,-25 43.3,25 0,0 0,-50" fill="#00a8d8" opacity="0.8"/>
  </g>
  
  <!-- Connection Lines (flowing arrows) -->
  <g id="connections" stroke="url(#cyanGlow)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
    <!-- Top arrow -->
    <line x1="500" y1="500" x2="500" y2="250"/>
    <polygon points="500,230 510,255 490,255" fill="url(#cyanGlow)"/>
    
    <!-- Bottom arrow -->
    <line x1="500" y1="500" x2="500" y2="750"/>
    <polygon points="500,770 490,745 510,745" fill="url(#cyanGlow)"/>
    
    <!-- Left arrow -->
    <line x1="500" y1="500" x2="250" y2="500"/>
    <polygon points="230,500 255,490 255,510" fill="url(#cyanGlow)"/>
    
    <!-- Right arrow -->
    <line x1="500" y1="500" x2="750" y2="500"/>
    <polygon points="770,500 745,510 745,490" fill="url(#cyanGlow)"/>
    
    <!-- Top-left diagonal -->
    <line x1="500" y1="500" x2="350" y2="350"/>
    <polygon points="335,335 350,360 330,350" fill="url(#cyanGlow)"/>
    
    <!-- Top-right diagonal -->
    <line x1="500" y1="500" x2="650" y2="350"/>
    <polygon points="665,335 650,360 670,350" fill="url(#cyanGlow)"/>
    
    <!-- Bottom-left diagonal -->
    <line x1="500" y1="500" x2="350" y2="650"/>
    <polygon points="335,665 350,640 330,650" fill="url(#cyanGlow)"/>
    
    <!-- Bottom-right diagonal -->
    <line x1="500" y1="500" x2="650" y2="650"/>
    <polygon points="665,665 650,640 670,650" fill="url(#cyanGlow)"/>
  </g>
</svg>
